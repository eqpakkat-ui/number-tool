<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<title>Number Tool</title>

<style>
* { box-sizing: border-box; font-family: 'Prompt', sans-serif; }

body {
    margin: 0;
    padding: 0;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    background: #000;
}

.main-card {
    background: #fff;
    padding: 20px;
    border-radius: 15px;
    width: 90%;
    max-width: 500px;
}

#output {
    margin-top: 10px;
    min-height: 80px;
    border: 1px solid #ccc;
    padding: 10px;
}

#custom-alert {
    position: fixed;
    top: 20px;
    left: 50%;
    transform: translateX(-50%);
    padding: 10px 20px;
    border-radius: 10px;
    display: none;
}

.alert-error { background: red; color: white; }
.alert-normal { background: green; color: white; }
</style>
</head>

<body>

<div class="main-card">
    <input id="input" placeholder="กรอกเลขแล้วกด Enter" style="width:100%;padding:10px;">
    <div id="output">รอรับข้อมูล...</div>
</div>

<div id="custom-alert"></div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getDatabase, ref, push, onValue } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

// 🔥 ใส่ config ของคุณ
const firebaseConfig = {
    apiKey: "AIzaSy...",
    authDomain: "number-tool-ab240.firebaseapp.com",
    databaseURL: "https://number-tool-ab240-default-rtdb.asia-southeast1.firebasedatabase.app",
    projectId: "number-tool-ab240"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

// =======================
// ✅ USER จาก URL
// =======================
const params = new URLSearchParams(window.location.search);
let userId = params.get("user");

if (!userId) {
    userId = "default";
}

console.log("USER:", userId);

// =======================
// Firebase (แยก user)
// =======================
const listRef = ref(db, "numbers/" + userId);
const alertRef = ref(db, "alerts/" + userId);

let items = [];
let lastAlertTs = 0;

const inputField = document.getElementById("input");

// โหลดข้อมูล
onValue(listRef, (snap) => {
    const data = snap.val();
    items = data ? Object.keys(data).map(k => data[k]) : [];
    updateUI();
});

// แจ้งเตือน
onValue(alertRef, (snap) => {
    const data = snap.val();
    if (!data) return;

    const alerts = Object.values(data);
    const last = alerts.sort((a,b)=>b.ts-a.ts)[0];

    if (!last) return;
    if (last.ts === lastAlertTs) return;

    lastAlertTs = last.ts;
    popup(last.msg, true);
});

// ยิงข้อมูล
inputField.addEventListener("keydown", (e) => {
    if (e.key === "Enter") {
        const val = inputField.value.trim();
        inputField.value = "";

        if (!val) return;

        if (items.includes(val)) {
            push(alertRef, {
                msg: `⚠️ เลขซ้ำ ${val}`,
                ts: Date.now()
            });

            popup(`⚠️ เลขซ้ำ ${val}`, true);
            return;
        }

        push(listRef, val);
    }
});

// UI
function updateUI() {
    const output = document.getElementById("output");

    if (items.length === 0) {
        output.innerHTML = "รอรับข้อมูล...";
        return;
    }

    output.innerHTML = items.join(", ");
}

// popup
function popup(msg, isError=false) {
    const el = document.getElementById("custom-alert");
    el.innerText = msg;
    el.className = isError ? "alert-error" : "alert-normal";
    el.style.display = "block";

    setTimeout(()=> el.style.display="none", 2000);
}

// แสดง user มุมจอ (เล็ก ๆ ไม่กระทบ UI)
document.body.insertAdjacentHTML(
  "beforeend",
  `<div style="position:fixed;top:10px;right:10px;color:white;font-size:12px;">
    USER: ${userId}
  </div>`
);
</script>

</body>
</html>
